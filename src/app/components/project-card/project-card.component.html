<article class="glass-card project-card">
  <div class="media-wrap">
    <img [src]="project?.imageUrl" [alt]="project?.title || 'Project image'" />
  </div>

  <div class="copy-wrap">
    <div class="card-meta" *ngIf="project">
      <span>{{ project.category | titlecase }}</span>
      <span *ngIf="project.year">{{ project.year }}</span>
    </div>

    <h3>{{ project?.title }}</h3>
    <p>{{ project?.description }}</p>

    <div class="tech-row" *ngIf="project?.technologies?.length">
      <span *ngFor="let tech of (project?.technologies | slice:0:3)">{{ tech }}</span>
    </div>

    <div class="card-actions" *ngIf="project">
      <a [routerLink]="['/portfolio', project.slug]">View details</a>
      <a *ngIf="project.link" [href]="project.link" target="_blank" rel="noopener noreferrer">Live preview</a>
    </div>
  </div>
</article>
